name: nomina-saas-db

services:
  postgres:
    image: postgres:15-alpine
    container_name: nomina_postgres
    environment:
      POSTGRES_USER: saas_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: nomina_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
